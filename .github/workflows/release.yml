name: Release

env:
  CARGO_DIST_VERSION: 0.28.0

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  dist:
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install cargo-dist
        run: |
          cargo install cargo-dist --locked --version "${CARGO_DIST_VERSION}"

      - name: Verify cargo-dist version
        run: |
          if cargo dist --version > /tmp/cargo-dist-version.txt 2>/dev/null; then
            echo "DIST_CMD=cargo dist" >> "$GITHUB_ENV"
          elif command -v cargo-dist >/dev/null 2>&1; then
            cargo-dist --version > /tmp/cargo-dist-version.txt
            echo "DIST_CMD=cargo-dist" >> "$GITHUB_ENV"
          elif command -v dist >/dev/null 2>&1; then
            dist --version > /tmp/cargo-dist-version.txt
            echo "DIST_CMD=dist" >> "$GITHUB_ENV"
          else
            echo "cargo-dist executable not found"
            exit 1
          fi
          grep -F "cargo-dist ${CARGO_DIST_VERSION}" /tmp/cargo-dist-version.txt

      - name: Build release artifacts
        run: ${DIST_CMD} build --artifacts=global

      - name: Publish GitHub release and upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${DIST_CMD} host --steps=upload

      - name: Attest release build provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: dist/*
