name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      TZ: UTC
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          components: rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test --locked

      - name: Demo drift (minimal)
        run: cargo run -- demo drift --seed 1 --threads 1 --fault-profile ci --out-dir demo_out --clean

      - name: Verify demo bundle
        run: cargo run -- verify --witness demo_out/drift/baseline_faults

  gauntlet-witness:
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check gauntlet witness root
        run: bash ./scripts/check_gauntlet_root.sh
